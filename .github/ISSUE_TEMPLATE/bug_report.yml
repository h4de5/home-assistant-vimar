name: 🐛 Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: |
        Paste relevant logs here. Enable debug logging first:
        ```yaml
        logger:
          logs:
            custom_components.vimar: debug
        ```
      render: text

  - type: input
    id: integration-version
    attributes:
      label: Integration Version
      placeholder: e.g., 2026.2.0
    validations:
      required: true

  - type: input
    id: ha-version
    attributes:
      label: Home Assistant Version
      placeholder: e.g., 2026.1.3
    validations:
      required: true

  - type: input
    id: vimar-version
    attributes:
      label: Vimar Web Server Version
      placeholder: e.g., v2.8
    validations:
      required: true

  - type: dropdown
    id: vimar-model
    attributes:
      label: Vimar Hardware Model
      options:
        - "01945 - Web server By-me"
        - "01946 - Web server Light By-me"
        - Other/Unknown
    validations:
      required: true

  - type: dropdown
    id: installation
    attributes:
      label: Installation Method
      options:
        - HACS
        - Manual
    validations:
      required: true

  - type: checkboxes
    id: affected-platforms
    attributes:
      label: Affected Platforms
      description: Which device types are affected?
      options:
        - label: Lights
        - label: Covers/Shutters
        - label: Switches
        - label: Climate/HVAC
        - label: Sensors
        - label: Media Players
        - label: Scenes
        - label: Binary Sensors

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that might help diagnose the issue
