# Vimar Integration Services

update_entities:
  name: Update all entities
  description: >
    Carrying out loading of the entities.
  fields:
    forced:
      name: Force loading
      description: Whether to force loading of all information, such as room info
      example: true

exec_vimar_sql:
  name: Execute Vimar SQL
  description: >
    Execute a SQL query on the Vimar web server.
  fields:
    sql:
      name: SQL Query
      description: SQL Query to be run on the webserver.
      example: SELECT 1

reload_default:
  name: Remove and reload
  description: >
    Removing all entites and then reload - reseting everything to default names.

reload:
  name: Reload
  description: Reload Vimar integration.

# ================================================
# COVER SERVICES
# ================================================

set_travel_times:
  name: Configura Tempi Apertura/Chiusura
  description: >
    Imposta i tempi di apertura e chiusura per una tapparella.
    I valori vengono salvati permanentemente e utilizzati per il tracking della posizione.
  target:
    entity:
      domain: cover
      integration: vimar
  fields:
    travel_time_up:
      name: Tempo Apertura (secondi)
      description: Tempo in secondi necessario per aprire completamente la tapparella
      required: true
      example: 28
      selector:
        number:
          min: 1
          max: 300
          step: 1
          unit_of_measurement: "s"
          mode: box
    travel_time_down:
      name: Tempo Chiusura (secondi)
      description: Tempo in secondi necessario per chiudere completamente la tapparella
      required: true
      example: 26
      selector:
        number:
          min: 1
          max: 300
          step: 1
          unit_of_measurement: "s"
          mode: box
